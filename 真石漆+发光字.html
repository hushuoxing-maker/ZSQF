@media(max-width:768px){.result-item{flex-direction:column;}}

<div class="header">
  <h1>🪨 古月ai智能体·真石漆+发光字门头门头灵感库</h1>
  <p>白天正立面｜平视无遮挡｜8K写实｜中英文双列提示｜每组唯一｜100%可施工</p>
</div>

<div class="input-wrap">
  <div class="label">请输入店铺行业类型（必填）</div>
  <input type="text" class="input-box" id="industryInput" placeholder="例如：高端餐饮、商务会所、建材家居、医美机构、汽车服务、烟酒茶行">
  <button class="gen-btn" id="genBtn" onclick="generatePrompts()">🚀 生成20组中英文不重复提示词</button>
</div>

<div class="result-wrap" id="resultWrap"></div>

<script>
let allPrompts = [];

// 随机抽取并删除保证不重复
function pickUnique(arr){
  const idx = Math.floor(Math.random()*arr.length);
  return arr.splice(idx,1)[0];
}

// 生成单组中英文提示
function createPrompt(industry, usedStylesCN, usedSlogansCN){
  const stylesCN = ["高端简约风格","大气稳重风格","高级质感风格","简约大气风格","稳重清晰风格","柔和质感风格","自然高端风格","现代简洁风格","高级稳重风格","治愈清新风格"];
  const stylesEN = ["High-end minimalist style","Grand and steady style","Premium texture style","Minimalist and grand style","Steady and clear style","Soft texture style","Natural high-end style","Modern clean style","High-end steady style","Healing fresh style"];
  const slogansCN = ["主营品类+高端简约标语","特色品类+大气稳重标语","招牌品类+高级质感标语","核心品类+简约大气标语","爆款品类+高端质感标语","主营项目+简约稳重标语","特色项目+高端大气标语","招牌项目+简约质感标语","核心项目+高端稳重标语","爆款项目+简约大气标语"];

  const availableStyles = stylesCN.filter(s=>!usedStylesCN.includes(s));
  const styleCN = pickUnique(availableStyles);
  usedStylesCN.push(styleCN);
  const styleEN = stylesEN[stylesCN.indexOf(styleCN)];

  const availableSlogans = slogansCN.filter(s=>!usedSlogansCN.includes(s));
  const sloganCN = pickUnique(availableSlogans);
  usedSlogansCN.push(sloganCN);
  const sloganEN = slogansEN[slogansCN.indexOf(sloganCN)];

  return {
    cn:`白天自然光，门头正立面，完整展示，正面平视，无透视畸变，无遮挡，真石漆墙面+发光字门头，石材质感厚重大气，${industry}店铺门头，真石漆墙面、不锈钢背光字、亚克力发光字，品牌店名+${sloganCN}，${styleCN}，8K高清，商业写实，可施工参考`,
    en:`Daytime natural light, front facade, full display, eye-level view, no distortion, no obstruction, real stone paint wall + illuminated signage, thick premium texture, ${industry} storefront, real stone paint wall, stainless backlit letters, acrylic illuminated letters, brand name + ${sloganEN}, ${styleEN}, 8K ultra HD, commercial realistic render, construction-ready reference`
  };
}

// 单条复制
function copySingle(text, btn){
  navigator.clipboard.writeText(text).then(()=>{
    btn.classList.add('copied'); btn.textContent="已复制";
    setTimeout(()=>{btn.classList.remove('copied'); btn.textContent=btn.dataset.default;},3000);
  });
}

// 一键复制全部
function copyAll(){
  const allText = allPrompts.map(p=>p.cn+"\n"+p.en).join("\n\n");
  navigator.clipboard.writeText(allText).then(()=>{alert("✅ 已成功复制全部20组中英文提示词！");});

  const industry = document.getElementById("industryInput").value.trim();

  const resultWrap = document.getElementById("resultWrap");

  genBtn.disabled=true; genBtn.textContent="正在生成..."; resultWrap.innerHTML=""; allPrompts=[];

  const usedSlogansCN = [];

  setTimeout(()=>{
    let resultHtml="";
    for(let i=0;i<10;i++){ // 10个不同风格+标语组合
      const prompt=createPrompt(industry, usedStylesCN, usedSlogansCN);
      allPrompts.push(prompt);
      resultHtml+=`
      <div class="result-item">

    resultWrap.innerHTML=resultHtml;
    genBtn.disabled=false; genBtn.textContent="🚀 生成20组中英文不重复提示词";
  },500);
}
</script>
</body>

    cn:`白天自然光，门头正立面，完整展示，正面平视，无透视畸变，无遮挡，真石漆墙面+发光字门头，石材质感厚重大气，${industry}店铺门头，真石漆墙面、不锈钢背光字、亚克力发光字，品牌店名+${sloganCN}，${styleCN}，8K高清，商业写实，可施工参考`,
    en:`Daytime natural light, front facade, full display, eye-level view, no distortion, no obstruction, real stone paint wall + illuminated signage, thick premium texture, ${industry} storefront, real stone paint wall, stainless backlit letters, acrylic illuminated letters, brand name + ${sloganEN}, ${styleEN}, 8K ultra HD, commercial realistic render, construction-ready reference`
  };
}

// 单条复制
function copySingle(text, btn){
  navigator.clipboard.writeText(text).then(()=>{
    btn.classList.add('copied'); btn.textContent="已复制";
    setTimeout(()=>{btn.classList.remove('copied'); btn.textContent=btn.dataset.default;},3000);
  });
}

// 一键复制全部
function copyAll(){
  const allText = allPrompts.map(p=>p.cn+"\n"+p.en).join("\n\n");
  navigator.clipboard.writeText(allText).then(()=>{alert("✅ 已成功复制全部20组中英文提示词！");});
}

// 生成20组
function generatePrompts(){
  const industry = document.getElementById("industryInput").value.trim();
  const genBtn = document.getElementById("genBtn");
  const resultWrap = document.getElementById("resultWrap");
  if(!industry){alert("请输入店铺行业类型");return;}
  genBtn.disabled=true; genBtn.textContent="正在生成..."; resultWrap.innerHTML=""; allPrompts=[];

  const usedStylesCN = [];
  const usedSlogansCN = [];

  setTimeout(()=>{
    let resultHtml="";
    for(let i=0;i<10;i++){ // 10个不同风格+标语组合
      const prompt=createPrompt(industry, usedStylesCN, usedSlogansCN);
      allPrompts.push(prompt);
      resultHtml+=`
      <div class="result-item">
        <div class="col">
          <div class="item-text">${i+1}. ${prompt.cn}</div>
          <button class="copy-btn" data-default="复制中文" onclick="copySingle('${prompt.cn.replace(/'/g,"&apos;")}',this)">复制中文</button>
        </div>
        <div class="col">
          <div class="item-text en">${prompt.en}</div>
          <button class="copy-btn" data-default="Copy English" onclick="copySingle('${prompt.en.replace(/'/g,"&apos;")}',this)">Copy English</button>
        </div>
      </div>`;
    }
    resultHtml+=`<button class="copy-all-btn" onclick="copyAll()">📋 一键复制全部中英文</button>`;
    resultWrap.innerHTML=resultHtml;
    genBtn.disabled=false; genBtn.textContent="🚀 生成20组中英文不重复提示词";
  },500);
}
</script>
